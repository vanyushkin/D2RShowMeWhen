name: Release
# Builds Windows (MSI) and Linux (AppImage + deb) on tag push.
# macOS builds are produced locally and uploaded via scripts/upload-macos-release.sh
# (code-signing and notarization are not available in CI).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            app/src-tauri/target/
          key: windows-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install Tauri CLI
        shell: pwsh
        run: |
          if (-not (Get-Command tauri -ErrorAction SilentlyContinue)) {
            cargo install tauri-cli --version "^2" --locked
          }

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run tauri:build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: app/src-tauri/target/release/bundle/msi/*.msi

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            patchelf \
            file

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            app/src-tauri/target/
          key: linux-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install Tauri CLI
        run: |
          command -v tauri >/dev/null 2>&1 || cargo install tauri-cli --version "^2" --locked

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run tauri:build

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: app/src-tauri/target/release/bundle/appimage/*.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: app/src-tauri/target/release/bundle/deb/*.deb

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          cat > /tmp/notes.md << NOTES
          ## What's included
          - Global hotkey activation (keyboard + mouse buttons)
          - Draggable always-on-top overlay windows per timer
          - Multiple timer profiles
          - EN / RU interface
          - Windows, Linux, and macOS support

          ## Downloads
          | Platform | File |
          |----------|------|
          | Windows | \`D2RShowMeWhen_${VERSION}_x64_en-US.msi\` |
          | Linux / Steam Deck | \`D2RShowMeWhen_${VERSION}_amd64.AppImage\` or \`.deb\` |
          | macOS | \`D2RShowMeWhen_${VERSION}_aarch64.dmg\` (uploaded separately) |

          ## Installation notes

          **macOS:** The app is not notarized. After copying to /Applications:
          \`\`\`
          sudo xattr -d com.apple.quarantine /Applications/D2RShowMeWhen.app
          \`\`\`

          **Steam Deck / Linux:** Global hotkeys require X11. On Steam Deck, use Desktop Mode.
          See the [README](https://github.com/vanyushkin/D2RShowMeWhen#steam-deck) for the full step-by-step guide.
          NOTES

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber artifacts/*
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "D2R Show Me When $TAG" \
              --notes-file /tmp/notes.md \
              artifacts/*
          fi
